{% extends 'base.html' %}
{% block title %}Payment Failed - Tamipee Farms{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5 text-center">
            <div class="card border-0 shadow-sm p-5">
                <div class="bg-danger bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center mx-auto mb-4" style="width:80px;height:80px">
                    <i class="bi bi-x-circle-fill text-danger" style="font-size:2.5rem"></i>
                </div>
                <h3 class="fw-bold text-danger">Payment Failed</h3>
                <p class="text-muted mb-4">
                    We couldn't process your payment. Your order is still saved.
                    You can try again or contact us if the issue persists.
                </p>
                <div class="d-flex flex-column gap-2">
                    <a href="{% url 'payments:initiate' %}" class="btn btn-danger btn-lg">
                        <i class="bi bi-arrow-repeat me-2"></i>Try Again
                    </a>
                    <a href="{% url 'store:contact' %}" class="btn btn-outline-secondary">
                        <i class="bi bi-headset me-2"></i>Contact Support
                    </a>
                    <a href="{% url 'store:orders' %}" class="btn btn-outline-success">
                        <i class="bi bi-bag me-2"></i>View My Orders
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
