{% extends 'base.html' %}

{% block title %}Check Your Email - Tamipee Farms{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card auth-card p-4 text-center">
                <i class="bi bi-envelope-check-fill text-success fs-1 mb-3"></i>
                <h3 class="fw-bold">Check Your Email</h3>
                <p class="text-muted">
                    If an account with that email exists, we've sent a password reset link.
                    Please check your inbox (and spam folder).
                </p>
                <a href="{% url 'accounts:login' %}" class="btn btn-outline-success mt-2">
                    <i class="bi bi-arrow-left me-2"></i>Back to Login
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
