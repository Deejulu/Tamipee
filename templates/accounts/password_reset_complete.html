{% extends 'base.html' %}

{% block title %}Password Reset Successful - Tamipee Farms{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card auth-card p-4 text-center">
                <i class="bi bi-check-circle-fill text-success fs-1 mb-3"></i>
                <h3 class="fw-bold">Password Updated!</h3>
                <p class="text-muted">Your password has been set successfully. You can now log in with your new password.</p>
                <a href="{% url 'accounts:login' %}" class="btn btn-success btn-lg fw-semibold mt-2">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Login Now
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
