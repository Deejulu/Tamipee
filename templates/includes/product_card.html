<div class="card border-0 shadow-sm h-100">
    {% if product.image %}
    <img src="{{ product.image.url }}" class="card-img-top" alt="{{ product.name }}" style="height:200px;object-fit:cover">
    {% else %}
    <div class="bg-light d-flex align-items-center justify-content-center" style="height:200px">
        <i class="bi bi-box fs-1 text-muted"></i>
    </div>
    {% endif %}
    <div class="card-body d-flex flex-column">
        <h5 class="fw-bold mb-1">{{ product.name }}</h5>
        <p class="text-muted small mb-2">{{ product.description|truncatewords:12 }}</p>
        <div class="mt-auto">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <span class="fs-5 fw-bold text-success">&#8358;{{ product.price }}</span>
                <span class="text-muted small">{{ product.get_unit_display }}</span>
            </div>
            {% if product.in_stock %}
            <div class="d-flex gap-2">
                <a href="{% url 'store:product_detail' product.pk %}" class="btn btn-outline-success btn-sm flex-grow-1">View</a>
                <a href="{% url 'store:add_to_cart' product.pk %}" class="btn btn-success btn-sm flex-grow-1">
                    <i class="bi bi-cart-plus me-1"></i>Cart
                </a>
            </div>
            {% else %}
            <button class="btn btn-secondary btn-sm w-100" disabled>Out of Stock</button>
            {% endif %}
        </div>
    </div>
</div>
