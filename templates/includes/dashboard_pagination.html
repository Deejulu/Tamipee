{% if page_obj.paginator.num_pages > 1 %}
<nav aria-label="Page navigation" class="mt-3 px-3 pb-3">
    <ul class="pagination pagination-sm mb-0 flex-wrap gap-1">
        <li class="page-item {% if not page_obj.has_previous %}disabled{% endif %}">
            <a class="page-link" href="?page=1" {% if not page_obj.has_previous %}tabindex="-1" aria-disabled="true"{% endif %}>First</a>
        </li>
        <li class="page-item {% if not page_obj.has_previous %}disabled{% endif %}">
            <a class="page-link" href="?page={% if page_obj.has_previous %}{{ page_obj.previous_page_number }}{% else %}1{% endif %}" {% if not page_obj.has_previous %}tabindex="-1" aria-disabled="true"{% endif %}>Previous</a>
        </li>
        <li class="page-item disabled">
            <span class="page-link">Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}</span>
        </li>
        <li class="page-item {% if not page_obj.has_next %}disabled{% endif %}">
            <a class="page-link" href="?page={% if page_obj.has_next %}{{ page_obj.next_page_number }}{% else %}{{ page_obj.paginator.num_pages }}{% endif %}" {% if not page_obj.has_next %}tabindex="-1" aria-disabled="true"{% endif %}>Next</a>
        </li>
        <li class="page-item {% if not page_obj.has_next %}disabled{% endif %}">
            <a class="page-link" href="?page={{ page_obj.paginator.num_pages }}" {% if not page_obj.has_next %}tabindex="-1" aria-disabled="true"{% endif %}>Last</a>
        </li>
    </ul>
</nav>
{% endif %}
