<div class="card border-0 shadow-sm stat-card">
    <div class="card-body">
        <div class="d-flex align-items-center">
            <div class="stat-icon bg-{{ color|default:'success' }} bg-opacity-10 text-{{ color|default:'success' }} rounded-circle d-flex align-items-center justify-content-center me-3" style="width:50px;height:50px;flex-shrink:0">
                <i class="bi bi-{{ icon|default:'bar-chart' }} fs-5"></i>
            </div>
            <div>
                <div class="fs-3 fw-bold">{{ value }}</div>
                <div class="text-muted small">{{ label }}</div>
            </div>
        </div>
    </div>
</div>
