{% extends 'dashboard/base_dashboard.html' %}
{% load crispy_forms_tags %}
{% block title %}Edit Category{% endblock %}
{% block nav_livestock %}active{% endblock %}

{% block content %}
<div class="section-header">
    <h5><i class="bi bi-tags me-2 text-success"></i>Edit Livestock Category</h5>
    <a href="{% url 'dashboard:admin_manage_categories' %}" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left me-1"></i>Back to Categories
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="form-card">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form|crispy }}
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-success px-4">
                        <i class="bi bi-check-circle me-2"></i>Save Category
                    </button>
                    <a href="{% url 'dashboard:admin_manage_categories' %}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
